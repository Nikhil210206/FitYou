{% extends "base.html" %}
{% block title %}Log In — FitYou{% endblock %}

{% block content %}
<section class="auth-wrap">
  <div class="auth-card fade-in">
    <h2>Welcome back</h2>
    <p class="sub">Log in to access your AI coach and personalized plans.</p>

    <form action="{{ url_for('login', next=request.args.get('next')) }}" method="POST">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Log In</button>
    </form>

    <p class="auth-alt">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
  </div>
</section>
{% endblock %}
