{% extends "base.html" %}
{% block title %}Create Account — FitYou{% endblock %}

{% block content %}
<section class="auth-wrap">
  <div class="auth-card fade-in">
    <h2>Create your account</h2>
    <p class="sub">Join FitYou and start training smarter today.</p>

    <form action="{{ url_for('register') }}" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" minlength="2" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" minlength="6" required />
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" id="age" name="age" placeholder="Age" min="13" max="100" />
        </div>
        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" name="gender">
            <option value="">Select…</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="goal">Fitness goal</label>
        <select id="goal" name="goal">
          <option value="">Select…</option>
          <option value="weight_loss">Weight Loss</option>
          <option value="muscle_gain">Muscle Gain</option>
          <option value="general_fitness">General Fitness</option>
          <option value="strength_training">Strength Training</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
    </form>

    <p class="auth-alt">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</section>
{% endblock %}
